name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths-ignore:
      - '**.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: |
          for f in app.js sw.js shared/*.js tools/*/index.js extensions/src/**/*.js; do
            [ -e "$f" ] && node --check "$f"
          done
      - name: Unit tests
        run: npm test
