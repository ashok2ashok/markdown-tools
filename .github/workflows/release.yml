name: Release & Deploy

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent deploys; queue instead of cancel so no push is skipped
concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: write   # create tags, releases, push version bump commit
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deployment

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout full history so tags are available ─────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Bump patch version from latest git tag (not package.json) ──────
      #    Deriving from the tag means force-pushes / out-of-sync package.json
      #    never cause "tag already exists" failures.
      - name: Bump version
        id: ver
        run: |
          git fetch --tags
          latest=$(git tag -l 'v*' | sort -V | tail -1)
          latest=${latest:-v1.0.0}
          current=${latest#v}
          IFS='.' read -ra parts <<< "$current"
          new_version="${parts[0]}.${parts[1]}.$((${parts[2]} + 1))"
          new_tag="v$new_version"

          # Safety: if tag somehow already exists, keep incrementing
          while git rev-parse "$new_tag" >/dev/null 2>&1; do
            parts[2]=$((${parts[2]} + 1))
            new_version="${parts[0]}.${parts[1]}.${parts[2]}"
            new_tag="v$new_version"
          done

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$new_version';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$new_tag"         >> "$GITHUB_OUTPUT"

      # ── 3. Commit version bump (skip ci prevents re-triggering) ────────
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} [skip ci]"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin master --follow-tags

      # ── 4. GitHub release with auto-generated notes ────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:              ${{ steps.ver.outputs.tag }}
          name:                  ${{ steps.ver.outputs.tag }}
          generate_release_notes: true

      # ── 5. Package site files (exclude dev/meta files) ─────────────────
      - name: Prepare dist
        run: |
          mkdir dist
          cp index.html clipboard2markdown.js styles.css favicon.ico \
             background.svg background-dark.svg dist/

      # ── 6. Upload Pages artifact ───────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # ── 7. Deploy to GitHub Pages ──────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
