<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Tools</title>
  <style>
    :root {
      --bg:       #ffffff;
      --surface:  #f6f8fa;
      --border:   #d0d7de;
      --text:     #1f2328;
      --muted:    #636c76;
      --accent:   #0969da;
      --accent-h: #0550ae;
      --success:  #1a7f4e;
      --radius:   6px;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: ui-monospace, 'SFMono-Regular', Consolas, monospace;
    }
    [data-theme="dark"] {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --accent-h:#79c0ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; font-size: 14px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; }
    .brand-badge {
      background: var(--accent); color: #fff;
      border-radius: 4px; padding: 1px 7px;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
    }
    .spacer { flex: 1; }
    .view-group { display: flex; }
    .view-group .btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .view-group .btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .view-group .btn:not(:first-child) { border-left: none; }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 7px 16px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .controls-label { font-size: 12px; color: var(--muted); }
    .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    /* ── Workspace ── */
    .workspace { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane.hidden { display: none; }
    .pane-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 12px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 11px; color: var(--muted);
    }

    /* ── Editor ── */
    .editor-body { position: relative; flex: 1; display: flex; overflow: hidden; }
    .paste-hint {
      position: absolute; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); pointer-events: none; text-align: center;
    }
    .paste-hint-inner { color: var(--muted); max-width: 320px; line-height: 1.6; }
    .paste-hint-kbd {
      display: inline-block; margin-bottom: 14px;
      font-family: var(--mono); font-size: 28px; font-weight: 700;
      color: var(--border);
    }
    .paste-hint strong { display: block; color: var(--text); font-size: 15px; margin-bottom: 6px; }
    .paste-hint small  { font-size: 12px; }
    #output {
      position: absolute; inset: 0; z-index: 2;
      resize: none; border: none; outline: none;
      padding: 14px 16px;
      font-family: var(--mono); font-size: 13px; line-height: 1.65;
      background: transparent; color: var(--text);
      overflow-y: auto;
    }

    /* ── Preview ── */
    #preview {
      flex: 1; overflow-y: auto; padding: 16px 24px;
      line-height: 1.65; font-size: 14px;
    }
    #preview h1, #preview h2 { border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: 1em 0 .5em; }
    #preview h3, #preview h4 { margin: .8em 0 .3em; }
    #preview h1 { font-size: 1.7em; }
    #preview h2 { font-size: 1.35em; }
    #preview h3 { font-size: 1.1em; }
    #preview p  { margin: .5em 0; }
    #preview ul, #preview ol { padding-left: 1.5em; margin: .5em 0; }
    #preview li { margin: .2em 0; }
    #preview code { background: var(--surface); padding: 2px 5px; border-radius: 3px; font-family: var(--mono); font-size: .88em; }
    #preview pre  { background: var(--surface); padding: 12px 14px; border-radius: var(--radius); overflow-x: auto; margin: .8em 0; }
    #preview pre code { background: none; padding: 0; font-size: .9em; }
    #preview blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--muted); margin: .8em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: .8em 0; font-size: .93em; }
    #preview th, #preview td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
    #preview th { background: var(--surface); font-weight: 600; }
    #preview tr:nth-child(even) td { background: color-mix(in srgb, var(--surface) 50%, transparent); }
    #preview a { color: var(--accent); }
    #preview img { max-width: 100%; border-radius: 4px; }
    #preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: var(--radius);
      font-size: 13px; font-family: var(--sans);
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      white-space: nowrap; transition: background .1s, border-color .1s;
      text-decoration: none; flex-shrink: 0;
    }
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
    .btn.active   { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-sm { padding: 3px 9px; font-size: 12px; }
    .btn-icon { padding: 5px 9px; }

    /* ── Form controls ── */
    select, input[type="checkbox"] { accent-color: var(--accent); }
    select {
      padding: 4px 8px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-size: 13px; font-family: var(--sans); cursor: pointer;
    }
    .chk-label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; user-select: none; }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <span class="brand-badge">md</span>
      Markdown Tools
    </div>
    <div class="spacer"></div>
    <div class="view-group">
      <button class="btn active" data-view="split">Split</button>
      <button class="btn" data-view="editor">Editor</button>
      <button class="btn" data-view="preview">Preview</button>
    </div>
    <div class="sep"></div>
    <button class="btn btn-icon" id="themeBtn" title="Toggle theme">☾</button>
  </header>

  <div class="controls">
    <span class="controls-label">Flavor:</span>
    <select id="flavor">
      <option value="gfm">GFM</option>
      <option value="commonmark">CommonMark</option>
      <option value="pandoc">Pandoc</option>
      <option value="rmarkdown">R Markdown</option>
      <option value="multimarkdown">MultiMarkdown</option>
    </select>
    <div class="sep"></div>
    <label class="chk-label"><input type="checkbox" id="smartTypo"> Smart typography</label>
    <label class="chk-label"><input type="checkbox" id="prettify" checked> Prettify</label>
    <div class="sep"></div>
    <button class="btn" id="pasteBtn">Paste from clipboard</button>
    <div class="spacer"></div>
    <button class="btn" id="dlBtn">Download .md</button>
    <button class="btn btn-primary" id="copyBtn">Copy</button>
  </div>

  <div class="workspace">

    <div class="pane" id="editorPane">
      <div class="pane-header">
        <span>Markdown</span>
        <span id="stats"></span>
      </div>
      <div class="editor-body">
        <div class="paste-hint" id="pasteHint">
          <div class="paste-hint-inner">
            <div class="paste-hint-kbd">⌘V</div>
            <strong>Paste rich text to convert</strong>
            Copy any HTML content from a web page, then paste here.<br>
            <small>Or drop an HTML file · Or click "Paste from clipboard"</small>
          </div>
        </div>
        <textarea id="output" spellcheck="false" aria-label="Markdown output"></textarea>
      </div>
    </div>

    <div class="pane" id="previewPane">
      <div class="pane-header"><span>Preview</span></div>
      <div id="preview"></div>
    </div>

  </div>

  <script src="page.js"></script>
</body>
</html>
