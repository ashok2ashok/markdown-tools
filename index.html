<div class="app-layout" id="appLayout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Tools">
    <div class="sidebar-header">
      <a href="#paste" class="brand-link" aria-label="Markdown Tools home">
        <div class="brand-logo">md</div>
        <span class="brand-name">Markdown Tools</span>
      </a>
      <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Collapse sidebar" title="Toggle sidebar">
        <svg class="icon" width="18" height="18"><use href="#icon-chevrons-left"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav" aria-label="Tool navigation">
      <div class="nav-section">
        <a href="#paste" class="nav-item nav-item--primary" data-tool="paste" data-tip="Paste to Markdown">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-paste"/></svg>
          <span class="nav-label">Paste to Markdown</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Write</div>
        <a href="#editor" class="nav-item" data-tool="editor" data-tip="Editor">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-editor"/></svg>
          <span class="nav-label">Editor</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Convert</div>
        <a href="#convert" class="nav-item" data-tool="convert" data-tip="MD ↔ HTML">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-convert"/></svg>
          <span class="nav-label">MD ↔ HTML</span>
        </a>
        <a href="#tables" class="nav-item" data-tool="tables" data-tip="Table Editor">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-tables"/></svg>
          <span class="nav-label">Table Editor</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Analyze</div>
        <a href="#toc" class="nav-item" data-tool="toc" data-tip="TOC Generator">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-toc"/></svg>
          <span class="nav-label">TOC Generator</span>
        </a>
        <a href="#links" class="nav-item" data-tool="links" data-tip="Link Auditor">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-links"/></svg>
          <span class="nav-label">Link Auditor</span>
        </a>
        <a href="#diff" class="nav-item" data-tool="diff" data-tip="Diff">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-diff"/></svg>
          <span class="nav-label">Diff</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Edit</div>
        <a href="#format" class="nav-item" data-tool="format" data-tip="Formatter">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-format"/></svg>
          <span class="nav-label">Formatter</span>
        </a>
        <a href="#frontmatter" class="nav-item" data-tool="frontmatter" data-tip="Front Matter">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-frontmatter"/></svg>
          <span class="nav-label">Front Matter</span>
        </a>
      </div>

      <div class="nav-section">
        <a href="#plugins" class="nav-item" data-tool="plugins" data-tip="Browser Extensions">
          <svg class="nav-icon" width="18" height="18"><use href="#icon-extensions"/></svg>
          <span class="nav-label">Browser Extensions</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme" aria-pressed="false">
        <svg class="icon" width="18" height="18"><use href="#icon-sun" id="themeIcon"/></svg>
      </button>
      <a class="icon-btn" href="https://github.com/ashok2ashok/markdown-tools" target="_blank" rel="noopener noreferrer" title="View on GitHub" aria-label="GitHub">
        <svg class="icon" width="18" height="18"><use href="#icon-github"/></svg>
      </a>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <!-- Tool container -->
  <main class="tool-root" id="toolRoot" role="main">
    <div class="tool-loading" id="toolLoading" aria-live="polite" aria-label="Loading tool">
      <div class="spinner"></div>
    </div>
  </main>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<script type="module" src="app.js"></script>
</body>
</html>
